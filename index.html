<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineBMR - Ultra Max</title>
    <style>
        :root { --main-color: #00e5ff; --bg-dark: #000000; --card-bg: #111; --text-gray: #777; }
        * { margin:0; padding:0; box-sizing:border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #fff; overflow-x: hidden; }

        /* HEADER E LOGO */
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.95); padding: 12px 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); }
        .logo-container { display: flex; align-items: center; gap: 8px; font-weight: 900; color: #fff; }
        .logo-icon { width: 35px; height: 35px; background: #000; border-radius: 8px; border: 1px solid var(--main-color); position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,229,255,0.3); }
        .logo-icon::after { content: 'B'; color: var(--main-color); font-weight: 900; font-size: 18px; }
        .logo-icon::before { content: ''; position: absolute; bottom: 4px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid var(--main-color); }

        .search-box { flex: 1; background: #161616; border-radius: 12px; display: flex; align-items: center; padding: 0 12px; height: 40px; border: 1px solid #2a2a2a; }
        .search-box input { background: none; border: none; color: #fff; width: 100%; font-size: 13px; margin-left: 8px; }

        /* CATEGORIAS (SCROLL) */
        .categorias-bar { display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px; scrollbar-width: none; background: #050505; }
        .cat-item { background: #0a0a0a; padding: 7px 16px; border-radius: 20px; font-size: 11px; font-weight: bold; color: var(--text-gray); border: 1px solid #222; white-space: nowrap; cursor: pointer; }
        .cat-item.active { background: var(--main-color); color: #000; border-color: var(--main-color); }

        /* GRID */
        .container { padding: 10px 15px 100px 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #222; position: relative; transition: 0.3s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .badge { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; font-size: 9px; color: var(--main-color); border: 1px solid var(--main-color); }
        .card-title { padding: 8px; font-size: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }

        /* MODAL PREMIUM */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { width: 100%; max-width: 340px; background: #080808; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .modal-content img { width: 120px; border-radius: 12px; margin-bottom: 15px; }
        
        .btn-play { display: block; background: var(--main-color); color: #000; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,229,255,0.2); }
        .btn-fav { background: #1a1a1a; color: #fff; width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; font-weight: bold; font-size: 12px; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #444; font-size: 10px; font-weight: bold; text-align: center; }
        .nav-item.active { color: var(--main-color); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <div class="logo-icon"></div>
            <span>CineBMR</span>
        </div>
        <div class="search-box">
            <input type="text" id="search" placeholder="O que vamos assistir?" oninput="buscar()">
        </div>
    </header>

    <div class="categorias-bar" id="cat-list">
        <div class="cat-item active" onclick="filtrarGenero('', this)">Tudo</div>
        <div class="cat-item" onclick="filtrarGenero('28', this)">Ação</div>
        <div class="cat-item" onclick="filtrarGenero('16', this)">Animes</div>
        <div class="cat-item" onclick="filtrarGenero('27', this)">Terror</div>
        <div class="cat-item" onclick="filtrarGenero('878', this)">Ficção</div>
        <div class="cat-item" onclick="filtrarGenero('35', this)">Comédia</div>
        <div class="cat-item" onclick="filtrarGenero('10749', this)">Romance</div>
    </div>

    <div class="container">
        <h2 id="sessao-titulo" style="font-size: 14px; margin-bottom: 15px; color: var(--main-color);">🔥 DESTAQUES</h2>
        <div id="lista" class="grid"></div>
        <button onclick="carregarMais()" id="btnMais" style="width:100%; padding:15px; background:none; border:1px solid #333; color:var(--main-color); margin-top:20px; border-radius:10px; font-weight:bold;">CARREGAR MAIS +</button>
    </div>

    <nav class="nav-bar">
        <div id="nav-movie" class="nav-item active" onclick="mudarTipo('movie')">FILMES</div>
        <div id="nav-tv" class="nav-item" onclick="mudarTipo('tv')">SÉRIES</div>
        <div class="nav-item" onclick="exibirFavoritos()">MINHA LISTA</div>
    </nav>

    <div id="modal" class="modal">
        <div class="modal-content">
            <img id="mImg" src="">
            <h3 id="mTitle" style="margin-bottom: 15px;"></h3>
            <a id="mLink" href="#" target="_blank" class="btn-play">▶ DAR O PLAY</a>
            <button id="btnFavoritar" class="btn-fav">❤ SALVAR NA LISTA</button>
            <p onclick="fechar()" style="color:#ff4444; margin-top:20px; cursor:pointer; font-weight:bold;">[ VOLTAR ]</p>
        </div>
    </div>

    <script>
        const API_KEY = '5799262499f305123f69c419c2a131e6'; 
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        let db = [];
        let pagina = 1;
        let tipoAtual = 'movie';
        let generoAtual = '';
        let favoritos = JSON.parse(localStorage.getItem('bmr_favs')) || [];

        async function carregar(resetar = true) {
            if(resetar) { pagina = 1; db = []; }
            const url = generoAtual 
                ? `https://api.themoviedb.org/3/discover/${tipoAtual}?api_key=${API_KEY}&language=pt-BR&with_genres=${generoAtual}&page=${pagina}`
                : `https://api.themoviedb.org/3/${tipoAtual}/popular?api_key=${API_KEY}&language=pt-BR&page=${pagina}`;
            
            const r = await fetch(url);
            const data = await r.json();
            db = [...db, ...data.results];
            render(db);
        }

        function render(dados) {
            document.getElementById('lista').innerHTML = dados.map(m => `
                <div class="card" onclick="abrirModal('${m.id}', '${m.media_type || tipoAtual}', '${(m.title || m.name).replace(/'/g, "")}', '${IMG_URL + m.poster_path}')">
                    <div class="badge">★ ${m.vote_average.toFixed(1)}</div>
                    <img src="${m.poster_path ? IMG_URL + m.poster_path : 'https://via.placeholder.com/500x750?text=CineBMR'}" loading="lazy">
                    <div class="card-title">${m.title || m.name}</div>
                </div>`).join('');
        }

        function carregarMais() { pagina++; carregar(false); }

        function abrirModal(id, tipo, titulo, img) {
            const tLink = (tipo === 'tv' || tipo === 'serie') ? 'serie' : 'filme';
            document.getElementById('mTitle').innerText = titulo;
            document.getElementById('mImg').src = img;
            
            // Player Super Atualizado para rodar direto
            document.getElementById('mLink').href = `https://embed.warezcdn.com/${tLink}/${id}`;
            
            const isFav = favoritos.some(f => f.id == id);
            const btn = document.getElementById('btnFavoritar');
            btn.innerText = isFav ? '❤ REMOVER' : '❤ SALVAR';
            btn.onclick = () => {
                const idx = favoritos.findIndex(f => f.id == id);
                if(idx > -1) favoritos.splice(idx, 1);
                else favoritos.push({id, title: titulo, poster_path: img.replace(IMG_URL, ""), vote_average: 0});
                localStorage.setItem('bmr_favs', JSON.stringify(favoritos));
                fechar();
            };
            document.getElementById('modal').classList.add('active');
        }

        function fechar() { document.getElementById('modal').classList.remove('active'); }

        function mudarTipo(t) {
            tipoAtual = t;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            carregar();
        }

        function filtrarGenero(id, el) {
            generoAtual = id;
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            carregar();
        }

        async function buscar() {
            let q = document.getElementById('search').value;
            if(q.length > 2) {
                const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=pt-BR&query=${q}`);
                const data = await r.json();
                render(data.results.filter(i => i.poster_path));
                document.getElementById('btnMais').style.display = 'none';
            } else {
                render(db);
                document.getElementById('btnMais').style.display = 'block';
            }
        }

        function exibirFavoritos() {
            document.getElementById('sessao-titulo').innerText = "❤ Minha Lista";
            render(favoritos);
            document.getElementById('btnMais').style.display = 'none';
        }

        carregar();
    </script>
</body>
</html>
