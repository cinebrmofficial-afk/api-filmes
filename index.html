<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineBMR - Oficial</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:sans-serif;background:#0f0f0f;color:#fff;padding-bottom:80px}
        .header{position:sticky;top:0;z-index:100;background:#0f0f0f;padding:15px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px}
        .logo{background:linear-gradient(45deg,#00d4ff,#00d084);padding:8px;border-radius:8px;font-weight:bold}
        .search-bar{flex:1;background:#242424;border-radius:20px;padding:8px 15px}
        .search-bar input{background:none;border:none;color:#fff;width:100%;outline:none}
        .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));gap:15px;padding:15px}
        .card{background:#1a1a1a;border-radius:12px;overflow:hidden;cursor:pointer;transition:0.3s}
        .card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
        .card-info{padding:8px;font-size:12px;text-align:center;min-height:45px;display:flex;align-items:center;justify-content:center}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal.active{display:flex}
        .modal-content{width:90%;max-width:400px;background:#1a1a1a;padding:20px;border-radius:20px;text-align:center}
        .watch-btn{display:block;background:#00d084;color:#fff;padding:15px;border-radius:10px;text-decoration:none;margin-top:15px;font-weight:bold;font-size:18px}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">CB</div>
        <div class="search-bar"><input type="text" id="search" placeholder="Buscar filmes..." oninput="buscar()"></div>
    </header>
    
    <div id="lista" class="grid"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <img id="mImg" style="width:100%;border-radius:10px">
            <h2 id="mTitle" style="margin:15px 0;font-size:20px"></h2>
            <a id="mLink" href="#" target="_blank" class="watch-btn">▶ ASSISTIR AGORA</a>
            <button onclick="fechar()" style="background:none;border:none;color:#aaa;margin-top:20px;cursor:pointer">FECHAR</button>
        </div>
    </div>

    <script>
        const API_KEY = '5799262499f305123f69c419c2a131e6'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        let db = [];

        async function carregar() {
            try {
                // Puxa as primeiras 20 páginas de filmes populares (aprox. 400 filmes)
                for (let i = 1; i <= 20; i++) {
                    const r = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=pt-BR&page=${i}`);
                    const data = await r.json();
                    const novos = data.results.map(m => ({
                        titulo: m.title,
                        imagem: m.poster_path ? IMG_URL + m.poster_path : 'https://via.placeholder.com/500x750?text=Sem+Capa',
                        link: `https://embed.warezcdn.com/filme/${m.id}`
                    }));
                    db = [...db, ...novos];
                }
                render(db);
            } catch (e) { 
                document.getElementById('lista').innerHTML = '<p>Erro ao carregar catálogo.</p>';
            }
        }

        function render(dados) {
            document.getElementById('lista').innerHTML = dados.map(m => `
                <div class="card" onclick="abrir('${m.titulo.replace(/'/g, "\\'")}','${m.imagem}','${m.link}')">
                    <img src="${m.imagem}" loading="lazy">
                    <div class="card-info">${m.titulo}</div>
                </div>
            `).join('');
        }

        function buscar() {
            let q = document.getElementById('search').value.toLowerCase();
            render(db.filter(m => m.titulo.toLowerCase().includes(q)));
        }

        function abrir(t, img, l) {
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mImg').src = img;
            document.getElementById('mLink').href = l;
            document.getElementById('modal').classList.add('active');
        }

        function fechar() { document.getElementById('modal').classList.remove('active'); }
        carregar();
    </script>
</body>
</html>
