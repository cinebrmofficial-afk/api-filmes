<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineBMR - Oficial</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:sans-serif;background:#0f0f0f;color:#fff;padding-bottom:80px}
        .header{position:sticky;top:0;z-index:100;background:#0f0f0f;padding:15px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px}
        .logo{width:35px;height:35px;background:url('logo.jpg') no-repeat center;background-size:cover;border-radius:8px;border:1.5px solid #2ecc71}
        .search-bar{flex:1;background:#242424;border-radius:20px;padding:8px 15px}
        .search-bar input{background:none;border:none;color:#fff;width:100%;outline:none}
        .grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;padding:10px}
        .card{background:#1a1a1a;border-radius:8px;overflow:hidden;cursor:pointer}
        .card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
        .card-info{padding:5px;font-size:10px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal.active{display:flex}
        .modal-content{width:90%;max-width:350px;background:#1a1a1a;padding:20px;border-radius:20px;text-align:center}
        .watch-btn{display:block;background:#2ecc71;color:#fff;padding:15px;border-radius:10px;text-decoration:none;margin-top:15px;font-weight:bold}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"></div>
        <div class="search-bar"><input type="text" id="search" placeholder="Buscar..." oninput="buscar()"></div>
    </header>
    <div id="lista" class="grid"></div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <img id="mImg" style="width:100%;border-radius:10px">
            <h2 id="mTitle" style="margin:15px 0;font-size:18px"></h2>
            <a id="mLink" href="#" target="_blank" class="watch-btn">▶ ASSISTIR AGORA</a>
            <button onclick="fechar()" style="background:none;border:none;color:#aaa;margin-top:20px">FECHAR</button>
        </div>
    </div>
    <script>
        const API_KEY = '5799262499f305123f69c419c2a131e6'; 
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        let db = [];
        async function carregar() {
            try {
                const r = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR&page=1`);
                const data = await r.json();
                db = data.results.map(m => ({
                    t: m.title,
                    i: IMG_URL + m.poster_path,
                    l: `https://embed.warezcdn.com/filme/${m.id}`
                }));
                render(db);
            } catch (e) { document.getElementById('lista').innerHTML = 'Erro de conexão.'; }
        }
        function render(d) {
            document.getElementById('lista').innerHTML = d.map(m => `
                <div class="card" onclick="abrir('${m.t.replace(/'/g, "")}','${m.i}','${m.l}')">
                    <img src="${m.i}" loading="lazy">
                    <div class="card-info">${m.t}</div>
                </div>
            `).join('');
        }
        function buscar() {
            let q = document.getElementById('search').value.toLowerCase();
            render(db.filter(m => m.t.toLowerCase().includes(q)));
        }
        function abrir(t,i,l) {
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mImg').src = i;
            document.getElementById('mLink').href = l;
            document.getElementById('modal').classList.add('active');
        }
        function fechar() { document.getElementById('modal').classList.remove('active'); }
        carregar();
    </script>
</body>
</html>
